<style>
:root { --c1: #4338CA; --c2: #EA580C; --c3: #0E7490; --dark: #1E1B4B; --gray: #64748B; --light: #F8FAFC; --border: #CBD5E1; }
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; color: #0F172A; }
.app { display: grid; grid-template-columns: 340px 1fr; height: 100vh; }
aside { background: #FFF; border-right: 1px solid var(--border); overflow-y: auto; padding: 24px 22px; }
aside h1 { font-size: 18px; margin: 0 0 4px; color: var(--dark); }
aside h2 { font-size: 13px; font-weight: 600; margin: 24px 0 8px; color: var(--dark); text-transform: uppercase; letter-spacing: 0.04em; }
aside p.sub { font-size: 12px; color: var(--gray); margin: 0 0 16px; line-height: 1.5; }
.legend-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; margin: 4px 0; border-radius: 8px; cursor: pointer; font-size: 13px; }
.legend-item:hover { background: var(--light); }
.legend-item.active { background: var(--light); }
.legend-item .dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
.legend-item .label { flex: 1; }
.legend-item .count { background: #E2E8F0; color: var(--dark); font-weight: 600; font-size: 11px; padding: 2px 8px; border-radius: 10px; }
.filter-group { margin: 0 0 16px; }
.filter-group select, .filter-group input { width: 100%; padding: 8px 10px; font-size: 13px; border: 1px solid var(--border); border-radius: 6px; background: #FFF; font-family: inherit; }
.filter-group select:focus, .filter-group input:focus { outline: 2px solid var(--c1); outline-offset: -1px; border-color: var(--c1); }
.stats { background: var(--light); border-radius: 10px; padding: 14px 16px; margin-top: 16px; }
.stats .big { font-size: 32px; font-weight: 700; color: var(--dark); line-height: 1; }
.stats .lbl { font-size: 12px; color: var(--gray); margin-top: 4px; }
main { position: relative; }
#map { width: 100%; height: 100%; }
.marker-c1 { background: var(--c1); } .marker-c2 { background: var(--c2); } .marker-c3 { background: var(--c3); }
.custom-marker { width: 22px; height: 22px; border-radius: 50%; border: 3px solid #FFF; box-shadow: 0 1px 4px rgba(0,0,0,0.35); }
.leaflet-popup-content-wrapper { border-radius: 10px; }
.leaflet-popup-content { margin: 14px 16px; min-width: 280px; max-width: 340px; }
.popup-title { font-weight: 700; font-size: 14px; color: var(--dark); margin: 0 0 4px; line-height: 1.3; }
.popup-badge { display: inline-block; font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 4px; color: #FFF; margin-bottom: 8px; letter-spacing: 0.04em; }
.popup-badge.c1 { background: var(--c1); } .popup-badge.c2 { background: var(--c2); } .popup-badge.c3 { background: var(--c3); }
.popup-meta { font-size: 12px; color: var(--gray); margin: 8px 0; line-height: 1.5; }
.popup-meta strong { color: var(--dark); font-weight: 600; }
.popup-desc { font-size: 12px; line-height: 1.5; margin: 8px 0 0; color: #1E293B; }
.popup-contact { font-size: 11px; line-height: 1.5; margin-top: 8px; padding-top: 8px; border-top: 1px solid #E2E8F0; }
.popup-contact a { color: var(--c1); text-decoration: none; }
.popup-contact a:hover { text-decoration: underline; }
.popup-status { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 10px; background: #E2E8F0; color: var(--dark); margin-top: 6px; font-weight: 600; }
@media (max-width: 768px) { .app { grid-template-columns: 1fr; grid-template-rows: auto 1fr; } aside { max-height: 40vh; } }
</style>
</head>

const SIN_COORDS = [];
const COLORS = { 1: '#4338CA', 2: '#EA580C', 3: '#0E7490' };
const CAPA_LABEL = { 1: 'Salud mental', 2: 'Adicciones', 3: 'Determinantes sociales' };
const map = L.map('map', { zoomControl: true }).setView([38.354, -0.478], 13);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors · © <a href="https://carto.com/attributions">CARTO</a>', maxZoom: 19 }).addTo(map);
const state = { capas: new Set([1, 2, 3]), cat: '', grupo: '', zona: '', titularidad: '', search: '' };
function escapeHtml(s) { if (!s) return ''; return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function makeMarker(r) {
  const icon = L.divIcon({ className: '', html: `<div class="custom-marker marker-c${r.capa}"></div>`, iconSize: [22, 22], iconAnchor: [11, 11], popupAnchor: [0, -10] });
  const marker = L.marker(r.coords, { icon }); marker.recurso = r;
  const popupHtml = `
    <div class="popup-title">${escapeHtml(r.nombre)}</div>
    <span class="popup-badge c${r.capa}">${escapeHtml(r.capa_label || CAPA_LABEL[r.capa] || '')}</span>
    <div class="popup-meta">
      <strong>Categoría:</strong> ${escapeHtml(r.categoria)}<br>
      <strong>Grupo:</strong> ${escapeHtml(r.grupo)}<br>
      <strong>Zona básica:</strong> ${escapeHtml(r.zona)}<br>
      <strong>Titularidad:</strong> ${escapeHtml(r.titularidad)}
    </div>
    <div class="popup-desc">${escapeHtml(r.descripcion)}</div>
    <div class="popup-contact">
      ${r.direccion ? '📍 ' + escapeHtml(r.direccion) + '<br>' : ''}
      ${r.telefono ? '☎ ' + escapeHtml(r.telefono) + '<br>' : ''}
      ${r.email ? '✉ <a href="mailto:' + escapeHtml(r.email) + '">' + escapeHtml(r.email) + '</a><br>' : ''}
      ${r.web ? '🌐 <a href="' + (r.web.startsWith('http') ? r.web : 'https://' + r.web) + '" target="_blank">' + escapeHtml(r.web) + '</a>' : ''}
    </div>
    ${r.estado ? '<div class="popup-status">' + escapeHtml(r.estado) + '</div>' : ''}`;
  marker.bindPopup(popupHtml, { maxWidth: 360 });
  return marker;
}
const cluster = L.markerClusterGroup({
  showCoverageOnHover: false, maxClusterRadius: 35,
  iconCreateFunction: function(c) {
    const markers = c.getAllChildMarkers(); const counts = {1:0, 2:0, 3:0};
    markers.forEach(m => counts[m.recurso.capa]++);
    let d = 1; if (counts[2] > counts[d]) d = 2; if (counts[3] > counts[d]) d = 3;
    return L.divIcon({ html: '<div style="background:' + COLORS[d] + ';color:#FFF;border:3px solid #FFF;border-radius:50%;width:38px;height:38px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;box-shadow:0 1px 4px rgba(0,0,0,0.35);">' + c.getChildCount() + '</div>', className: '', iconSize: [38, 38] });
  }
});
map.addLayer(cluster);
const counts = {1: 0, 2: 0, 3: 0}; RECURSOS.forEach(r => counts[r.capa]++);
const legendEl = document.getElementById('legend');
[1, 2, 3].forEach(capa => {
  const div = document.createElement('div'); div.className = 'legend-item active'; div.dataset.capa = capa;
  div.innerHTML = `<span class="dot" style="background:${COLORS[capa]}"></span><span class="label">Capa ${capa} · ${CAPA_LABEL[capa]}</span><span class="count">${counts[capa]}</span>`;
  div.addEventListener('click', () => {
    const c = Number(div.dataset.capa);
    if (state.capas.has(c)) { state.capas.delete(c); div.classList.remove('active'); div.style.opacity = 0.4; }
    else { state.capas.add(c); div.classList.add('active'); div.style.opacity = 1; }
    refresh();
  });
  legendEl.appendChild(div);
});
function populateSelect(id, key) {
  const sel = document.getElementById(id);
  const values = [...new Set(RECURSOS.map(r => r[key]))].filter(v => v).sort();
  values.forEach(v => { const opt = document.createElement('option'); opt.value = v; opt.textContent = v; sel.appendChild(opt); });
}
populateSelect('filter-cat', 'categoria'); populateSelect('filter-grupo', 'grupo'); populateSelect('filter-zona', 'zona'); populateSelect('filter-titularidad', 'titularidad');
const keyMap = {'filter-cat':'cat','filter-grupo':'grupo','filter-zona':'zona','filter-titularidad':'titularidad'};
Object.keys(keyMap).forEach(id => { document.getElementById(id).addEventListener('change', e => { state[keyMap[id]] = e.target.value; refresh(); }); });
document.getElementById('filter-search').addEventListener('input', e => { state.search = e.target.value.toLowerCase(); refresh(); });
function refresh() {
  cluster.clearLayers(); let n = 0;
  RECURSOS.forEach(r => {
    if (!state.capas.has(r.capa)) return;
    if (state.cat && r.categoria !== state.cat) return;
    if (state.grupo && r.grupo !== state.grupo) return;
    if (state.zona && r.zona !== state.zona) return;
    if (state.titularidad && r.titularidad !== state.titularidad) return;
    if (state.search && !r.nombre.toLowerCase().includes(state.search)) return;
    cluster.addLayer(makeMarker(r)); n++;
  });
  document.getElementById('stat-count').textContent = n;
}
refresh();
// Recursos sin coordenadas (si los hubiera)
if (SIN_COORDS && SIN_COORDS.length) {
  const box = document.getElementById('no-coords');
  box.style.display = 'block';
  box.innerHTML = '<strong>Recursos no representados (sin coordenadas válidas):</strong><ul style="margin:8px 0 0 16px;padding:0;">' +
    SIN_COORDS.map(r => '<li>' + escapeHtml(r.nombre) + '</li>').join('') + '</ul>';
}
